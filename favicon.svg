<svg width="64" height="64" viewBox="10 15 80 75" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="2" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.7"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <g fill="#FFFFFF" filter="url(#dropShadow)">
        <!-- Letter A (Spine, Left Leg, Crossbar) -->
        <g class="letter-a">
            <!-- Main Spine -->
            <rect x="46" y="20" width="8" height="60" />
            <!-- Left Leg of A -->
            <polygon points="46,20 54,20 24,80 16,80" />
            <!-- Crossbar of A -->
            <rect x="33" y="54" width="13" height="3" />
            <!-- Serifs -->
            <rect x="11" y="78" width="18" height="2" />
            <rect x="39" y="78" width="22" height="2" />
            <rect x="39" y="20" width="9" height="2" />
        </g>
        <!-- Letter P (Loop structure) -->
        <g class="letter-p">
            <path d="
                M 54 20 
                H 68 
                C 85 20, 85 52, 68 52 
                H 54 
                V 20 
                Z 
                M 54 27 
                H 65 
                C 75 27, 75 45, 65 45 
                H 54 
                V 27 
                Z" fill-rule="evenodd" />
        </g>
    </g>
</svg>
